<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё портфолио</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1 class="logo">Ярослав</h1>
    <nav class="nav" id="nav-menu">
      <ul>
        <li><a href="#about">Обо мне</a></li>
        <li><a href="#skills">Навыки</a></li>
        <li><a href="#" id="open-modal-btn">Связаться</a></li>
      </ul>
    </nav>
    <button class="burger" id="burger-btn">☰</button>
  </header>

  <main>
    <section id="about">
      <h2>Обо мне</h2>
      <p>Начинающий fullstack-разработчик, который с головой в IT. Люблю учиться и строить крутые вещи.</p>
    </section>
    <section id="skills">
      <h2>Навыки</h2>
      <ul>
        <li>HTML & CSS</li>
        <li>JavaScript</li>
        <li>Git</li>
        <li>React (скоро)</li>
      </ul>
    </section>
  </main>

  <!-- Модальное окно -->
  <div class="modal" id="contact-modal">
    <div class="modal-content">
      <span class="close-btn" id="close-modal-btn">&times;</span>
      <h2>Свяжитесь со мной</h2>
      <form>
        <input type="text" placeholder="Ваше имя" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Сообщение"></textarea>
        <button type="submit">Отправить</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
